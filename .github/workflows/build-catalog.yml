name: Build Catalog

on:
  workflow_run:
    workflows: [Fetch Catalog Sources]
    types: [completed]
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Successful Fetch Catalog Sources run ID to reuse"
        type: string
        required: false
      override_audit:
        description: "Bypass catalog audit thresholds (intentional big change — see docs/catalog-auditability.md)"
        type: boolean
        default: false

concurrency:
  group: catalog-build
  cancel-in-progress: false

permissions:
  actions: read
  contents: write

jobs:
  build:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Restore source cache
        uses: actions/cache/restore@v4
        with:
          path: data/sources
          key: catalog-sources-v3-${{ hashFiles('stations.json') }}-${{ github.run_id }}
          restore-keys: |
            catalog-sources-v3-${{ hashFiles('stations.json') }}-
            catalog-sources-v3-

      - name: Validate source fetch run
        if: github.event_name == 'workflow_dispatch' && inputs.source_run_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          run_json=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}")
          workflow_name=$(jq -r '.name' <<< "$run_json")
          conclusion=$(jq -r '.conclusion' <<< "$run_json")
          head_branch=$(jq -r '.head_branch' <<< "$run_json")
          artifact_json=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}/artifacts?per_page=100")
          artifact_count=$(jq '[.artifacts[] | select(.expired == false and (.name | startswith("catalog-sources-shard-")))] | length' <<< "$artifact_json")
          {
            echo "### Catalog source artifacts"
            echo "- Run: ${SOURCE_RUN_ID}"
            echo "- Workflow: ${workflow_name}"
            echo "- Conclusion: ${conclusion}"
            echo "- Branch: ${head_branch}"
            echo "- Source shard artifacts: ${artifact_count}/8"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$workflow_name" != "Fetch Catalog Sources" ] || [ "$conclusion" != "success" ] || [ "$head_branch" != "main" ] || [ "$artifact_count" -ne 8 ]; then
            echo "Invalid source run: expected a successful Fetch Catalog Sources run on main with 8 live shard artifacts." >&2
            exit 1
          fi

      - name: Download fetched shards
        if: github.event_name != 'workflow_dispatch' || inputs.source_run_id != ''
        uses: actions/download-artifact@v4
        with:
          pattern: catalog-sources-shard-*
          path: artifact-shards
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id || inputs.source_run_id }}

      - name: Merge shard artifacts into source cache
        if: github.event_name != 'workflow_dispatch' || inputs.source_run_id != ''
        run: |
          mkdir -p data/sources
          if [ -d artifact-shards ]; then
            find artifact-shards -name '*.jsonl' -exec cp {} data/sources/ \;
          fi
          echo "Source files after merge: $(find data/sources -maxdepth 1 -name '*.jsonl' | wc -l | tr -d ' ')"
          node --input-type=module -e "
            import fs from 'fs';
            const stations = JSON.parse(fs.readFileSync('stations.json', 'utf8'));
            const handles = new Set(stations.flatMap((s) => s.sources.map((src) => src.handle.replace('@',''))));
            const have = new Set(fs.readdirSync('data/sources').filter((f) => f.endsWith('.jsonl')).map((f) => f.replace(/\\.jsonl$/, '')));
            const missing = [...handles].filter((h) => !have.has(h));
            if (missing.length) console.warn('No source JSONL for unrepresented handles:', missing.join(', '));
          "

      - name: Prepare pnpm
        run: |
          corepack enable
          if node -e "const pm=require('./package.json').packageManager||''; process.exit(pm.startsWith('pnpm@')?0:1)"; then
            corepack install
          else
            corepack prepare pnpm@10.32.1 --activate
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build catalog.json
        id: build-catalog
        run: bash scripts/build-catalog.sh --process-only

      - name: Audit catalog source health
        if: always() && steps.build-catalog.outcome == 'success'
        env:
          CATALOG_AUDIT_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.override_audit && '1' || '' }}
        run: |
          set +e
          node scripts/audit-catalog-health.mjs --markdown-file "$RUNNER_TEMP/catalog-health.md"
          status=$?
          set -e
          cat "$RUNNER_TEMP/catalog-health.md" >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Audit catalog against manifest
        if: success() && steps.build-catalog.outcome == 'success'
        env:
          CATALOG_AUDIT_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.override_audit && '1' || '' }}
        run: node scripts/validate-catalog-manifest.mjs --update --diff-file "$RUNNER_TEMP/catalog-diff.txt"

      - name: Count videos needing AI tags
        id: pending-tags-before
        run: echo "count=$(node scripts/catalog-tag-status.mjs public/catalog.json)" >> "$GITHUB_OUTPUT"

      - name: Smoke test AI gateway
        id: gateway-smoke
        if: steps.pending-tags-before.outputs.count != '0'
        continue-on-error: true
        env:
          FAGW_API_KEY: ${{ secrets.FAGW_API_KEY }}
          FAGW_PROJECT_ID: looptv
        run: node scripts/smoke-tag-gateway.mjs

      - name: Tag new videos via AI gateway
        if: steps.gateway-smoke.outcome == 'success' && steps.pending-tags-before.outputs.count != '0'
        env:
          FAGW_API_KEY: ${{ secrets.FAGW_API_KEY }}
          FAGW_PROJECT_ID: looptv
        run: node scripts/tag-videos.mjs

      - name: Note unavailable AI tagging
        if: steps.pending-tags-before.outputs.count != '0' && steps.gateway-smoke.outcome != 'success'
        env:
          GATEWAY_STATUS: ${{ steps.gateway-smoke.outputs.status }}
          PENDING_TAGS: ${{ steps.pending-tags-before.outputs.count }}
        run: |
          echo "::warning::AI gateway ${GATEWAY_STATUS:-unknown}; cache and audit will continue, but shipping ${PENDING_TAGS} pending videos is blocked."

      - name: Count videos still needing AI tags
        id: pending-tags-final
        if: always() && steps.build-catalog.outcome == 'success'
        run: echo "count=$(node scripts/catalog-tag-status.mjs public/catalog.json)" >> "$GITHUB_OUTPUT"

      - name: Report AI tagging health
        if: always() && steps.build-catalog.outcome == 'success'
        env:
          GATEWAY_STATUS: ${{ steps.gateway-smoke.outputs.status }}
          PENDING_TAGS_BEFORE: ${{ steps.pending-tags-before.outputs.count }}
          PENDING_TAGS_FINAL: ${{ steps.pending-tags-final.outputs.count }}
        run: |
          {
            echo "### Catalog AI tagging"
            if [ "${PENDING_TAGS_BEFORE:-0}" = "0" ]; then
              echo "- Gateway status: not called (no pending tags)"
            else
              echo "- Gateway status: ${GATEWAY_STATUS:-unknown}"
            fi
            echo "- Pending videos before tagging: ${PENDING_TAGS_BEFORE:-unknown}"
            echo "- Pending videos after tagging: ${PENDING_TAGS_FINAL:-unknown}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Save source cache
        if: success() && steps.build-catalog.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: data/sources
          key: catalog-sources-v3-${{ hashFiles('stations.json') }}-${{ github.run_id }}

      - name: Enforce AI tagging shipping gate
        if: always() && steps.build-catalog.outcome == 'success' && steps.pending-tags-final.outputs.count != '0'
        env:
          GATEWAY_STATUS: ${{ steps.gateway-smoke.outputs.status }}
          PENDING_TAGS: ${{ steps.pending-tags-final.outputs.count }}
        run: |
          echo "AI gateway ${GATEWAY_STATUS:-unknown}; refusing to ship ${PENDING_TAGS:-unknown} untagged videos." >&2
          exit 1

      - name: Check for changes
        id: diff
        run: |
          git diff --stat public/catalog.json public/catalog-summary.json catalog-manifest.json
          echo "changed=$(git diff --name-only public/catalog.json public/catalog-summary.json catalog-manifest.json | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed != '0' && steps.pending-tags-final.outputs.count == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/catalog.json public/catalog-summary.json catalog-manifest.json
          NEW_COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('public/catalog.json','utf8')); console.log(Object.values(d.stations).reduce((s,st) => s + st.videos.length, 0))")
          git commit -m "Update catalog: ${NEW_COUNT} videos" \
            -m "$(cat "$RUNNER_TEMP/catalog-diff.txt")" \
            -m "Automated bi-weekly catalog refresh."
          git push

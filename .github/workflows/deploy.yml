name: Deploy to Cloudflare Pages
on:
  workflow_dispatch:
  pull_request:
jobs:
  deploy-production:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Prepare pnpm
        run: |
          corepack enable
          if node -e "const pm=require('./package.json').packageManager||''; process.exit(pm.startsWith('pnpm@')?0:1)"; then
            corepack install
          else
            corepack prepare pnpm@10.32.1 --activate
          fi
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm cf:build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=looptv --branch=main --commit-dirty=true
      - name: Smoke production
        run: curl --fail --silent --show-error --location --output /dev/null --retry 3 --retry-delay 5 https://looptv.pages.dev

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Prepare pnpm
        run: |
          corepack enable
          if node -e "const pm=require('./package.json').packageManager||''; process.exit(pm.startsWith('pnpm@')?0:1)"; then
            corepack install
          else
            corepack prepare pnpm@10.32.1 --activate
          fi
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm cf:build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=looptv --branch=pr-${{ github.event.number }} --commit-dirty=true
      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview: https://pr-${{ github.event.number }}.looptv.pages.dev`
            })
